<!DOCTYPE html>

<head>

<link rel="apple-touch-icon" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">

<body>
<div id="app"></div>
<!-- data first (organisms + maps), then the app code -->
<script src="./data.js"></script>
<script src="./app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    // Register only — do NOT auto-reload on update (that would wipe the user's
    // in-memory filters mid-session). New code is picked up on the next open;
    // the network-first worker already serves the latest shell when online.
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  });
}
</script>
</body>
</html>
