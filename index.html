<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>South Africa — Species Explorer · Cal Academy 2026</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#5e7249">
<!-- color-scheme follows the app's own light/dark toggle (data-theme). Light by default so
     iOS auto-dark can't render form-control text white-on-light; dark when the user toggles. -->
<meta name="color-scheme" content="light dark">
<style>:root{color-scheme:light}:root[data-theme=dark]{color-scheme:dark}input,textarea,select,button{color:var(--ink)}</style>
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SA Species">
</head>
<body>
<div id="app"></div>
<!-- data first (organisms + maps), then the app code -->
<script src="./data.js"></script>
<script src="./names.js"></script>
<script src="./app.js"></script>
<!-- the photo URL list, so the PAGE can precache them (the page outlives the service worker
     on iOS, which the SW-driven precache did not — that's why "save photos" only got partway) -->
<script src="./precache-list.js"></script>
<!-- offline-readiness pill: tells the user whether the app is saved for the flight -->
<div id="offlinePill" hidden style="position:fixed;z-index:9999;right:10px;bottom:calc(env(safe-area-inset-bottom,0px) + 10px);font:600 12px/1.3 system-ui,-apple-system,sans-serif;background:#fbf7ee;color:#2b2723;border:1px solid #cfc5b2;border-radius:14px;padding:8px 13px;box-shadow:0 2px 10px rgba(0,0,0,.12);cursor:pointer;max-width:86vw;display:flex;align-items:center;gap:7px"></div>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").then(function (reg) { try { reg.update(); } catch (e) {} }).catch(function () {});

    // ---- offline-readiness pill (page-driven photo precache) ----
    var pill = document.getElementById("offlinePill");
    var PHOTOS = (self.PRECACHE_URLS || []);
    var MEDIA = "sa-media-v1";
    var saving = false, hideT = 0;
    function show(html, bg) { pill.innerHTML = html; pill.style.background = bg || "#fbf7ee"; pill.hidden = false; clearTimeout(hideT); }
    function autohide() { clearTimeout(hideT); hideT = setTimeout(function () { pill.hidden = true; }, 5000); }
    function urlOf(u) { try { return new Request(u).url; } catch (e) { return u; } }
    function cachedSet() {
      if (!("caches" in window)) return Promise.resolve(new Set());
      return caches.open(MEDIA).then(function (c) { return c.keys(); }).then(function (ks) {
        var s = new Set(); ks.forEach(function (r) { s.add(r.url); }); return s;
      }).catch(function () { return new Set(); });
    }
    function countCached() { return cachedSet().then(function (h) { var n = 0; for (var i = 0; i < PHOTOS.length; i++) if (h.has(urlOf(PHOTOS[i]))) n++; return n; }); }

    function refresh() {
      if (saving || !PHOTOS.length) return;
      countCached().then(function (n) {
        var total = PHOTOS.length;
        if (n >= total) { show('<span style="color:#5e7249">●</span> Saved for offline — all ' + total + ' photos'); autohide(); }
        else {
          show('<span style="color:#b5623c">●</span> Save photos for offline <b style="text-decoration:underline">↓</b> <span style="color:#9a917f;font-weight:400">' + n + '/' + total + '</span>');
          pill.onclick = savePhotos;
        }
      });
    }

    function savePhotos() {
      if (saving) return;
      if (!navigator.onLine) { show('<span style="color:#b5623c">◍</span> You’re offline — connect to Wi‑Fi, then tap to save photos'); pill.onclick = savePhotos; autohide(); return; }
      saving = true;
      var total = PHOTOS.length, cache;
      caches.open(MEDIA).then(function (c) { cache = c; return cachedSet(); }).then(function (have) {
        var todo = PHOTOS.filter(function (u) { return !have.has(urlOf(u)); });
        function progress() { return countCached().then(function (n) { if (saving) show('<span style="color:#b5623c">◍</span> Saving photos… ' + n + ' / ' + total + '<span style="color:#9a917f;font-weight:400"> — keep the app open</span>'); return n; }); }
        function fetchOne(u) {
          return new Promise(function (res) {
            var done = false, to = setTimeout(function () { if (!done) { done = true; res(false); } }, 15000);
            fetch(u, { mode: "cors" }).then(function (r) {
              if (r && r.ok) return cache.put(u, r.clone()).then(function () { return true; });
              return false;
            }).then(function (ok) { if (!done) { done = true; clearTimeout(to); res(ok); } })
              .catch(function () { if (!done) { done = true; clearTimeout(to); res(false); } });
          });
        }
        function runList(list) {
          var i = 0, CONC = 5, offline = false;
          function worker() {
            if (offline || i >= list.length) return Promise.resolve();
            if (!navigator.onLine) { offline = true; return Promise.resolve(); }
            var u = list[i++];
            return fetchOne(u).then(function () { return (i % 12 === 0) ? progress().then(worker) : worker(); });
          }
          var ws = []; for (var k = 0; k < CONC && k < list.length; k++) ws.push(worker());
          return Promise.all(ws).then(function () { return offline; });
        }
        function pass(list, n) {
          if (!list.length || n <= 0) return Promise.resolve();
          return runList(list).then(function (offline) {
            if (offline) return "offline";
            return cachedSet().then(function (h) {
              var still = PHOTOS.filter(function (u) { return !h.has(urlOf(u)); });
              return still.length ? pass(still, n - 1) : null;
            });
          });
        }
        return pass(todo, 3);
      }).then(function (r) {
        saving = false;
        return countCached().then(function (n) {
          if (n >= total) { show('<span style="color:#5e7249">●</span> Saved for offline — all ' + total + ' photos'); autohide(); }
          else if (r === "offline" || !navigator.onLine) { show('<span style="color:#b5623c">◍</span> Went offline — saved ' + n + ' / ' + total + '. Reconnect &amp; tap to finish'); pill.onclick = savePhotos; }
          else { show('<span style="color:#b5623c">●</span> Saved ' + n + ' / ' + total + ' — tap to get the rest'); pill.onclick = savePhotos; }
        });
      }).catch(function () { saving = false; refresh(); });
    }

    setTimeout(refresh, 1500);
    window.addEventListener("online", function () { if (!saving) refresh(); });
  });
}
</script>
</body>
</html>
